name: deployment action

on: 
  push:
    branches: [main]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: 
          node-version-file: "package.json"
      - run: npm ci
      - run: npm run test
      - run: npm run build